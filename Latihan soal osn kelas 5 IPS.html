<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSN Master AI | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: radial-gradient(circle, #0f172a 0%, #020617 100%); --text: #f8fafc; }
        [data-theme='aqua'] { --bg: linear-gradient(135deg, #3ab6d2 0%, #60a5fa 100%); --text: #0c4a6e; }
        [data-theme='candy'] { --bg: linear-gradient(135deg, #ffd1ff 0%, #fbc2eb 100%); --text: #831843; }
        body { background: var(--bg); min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); transition: 0.5s; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .opt-btn { width: 100%; text-align: left; padding: 1rem; border-radius: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; margin-bottom: 0.5rem; font-weight: 600; }
        .opt-btn:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .opt-correct { background: #10b981 !important; color: white; }
        .opt-wrong { background: #ef4444 !important; color: white; }
        .border-correct { border-color: #10b981 !important; box-shadow: 0 0 15px #10b98144; }
        .border-typo { border-color: #fcc419 !important; box-shadow: 0 0 15px #fcc41944; }
        .border-wrong { border-color: #ff4d4d !important; box-shadow: 0 0 15px #ff4d4d44; }
    </style>
</head>
<body>

    <div id="quiz-card" class="w-full max-w-xl glass rounded-[2.5rem] p-8 md:p-10 animate__animated animate__fadeIn">
        <div id="header-ui" class="flex justify-between items-center mb-6">
            <span id="q-counter" class="text-[10px] font-black uppercase opacity-60">SOAL 1/50</span>
            <div class="flex gap-2">
                <div onclick="setTheme('midnight')" class="w-5 h-5 rounded-full bg-slate-900 border border-white/20 cursor-pointer"></div>
                <div onclick="setTheme('aqua')" class="w-5 h-5 rounded-full bg-cyan-400 border border-white/20 cursor-pointer"></div>
                <div onclick="setTheme('candy')" class="w-5 h-5 rounded-full bg-pink-400 border border-white/20 cursor-pointer"></div>
            </div>
        </div>
        
        <div id="game-area">
            <h2 id="q-text" class="text-xl font-bold mb-8 leading-relaxed"></h2>
            
            <div id="isian-zone" class="hidden space-y-4">
                <input type="text" id="user-ans" placeholder="Ketik jawabanmu..." class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-white outline-none focus:border-indigo-400 transition-all">
                <button onclick="checkIsian()" class="w-full py-4 bg-indigo-600 rounded-2xl font-black text-white active:scale-95 transition-all">KIRIM</button>
            </div>

            <div id="pg-zone" class="hidden flex flex-col"></div>

            <div id="feedback-box" class="hidden mt-6 animate__animated animate__fadeInUp">
                <div class="p-6 rounded-3xl bg-black/40 border border-white/10">
                    <h3 id="res-title" class="font-black text-sm uppercase mb-3"></h3>
                    <p id="ai-msg" class="text-sm leading-relaxed opacity-90 italic mb-4"></p>
                    <button onclick="nextQ()" class="w-full py-3 bg-white/10 rounded-xl text-[10px] font-black uppercase">Soal Selanjutnya →</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center py-6">
            <div id="capture-area" class="p-8 rounded-[2rem] bg-indigo-900/20 border border-indigo-500/30 mb-8">
                <h2 class="text-3xl font-black mb-2">HASIL LATIHAN</h2>
                <p class="text-xs opacity-60 mb-6 uppercase tracking-widest">OSN Master AI - Science Lab</p>
                <div class="text-6xl font-black mb-2 text-indigo-400" id="final-score">0</div>
                <p class="text-sm font-bold opacity-80" id="final-stats"></p>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="takeScreenshot()" class="py-4 bg-green-600 rounded-2xl font-black text-sm uppercase tracking-widest flex items-center justify-center gap-2">
                    📸 Download & Share
                </button>
                <button onclick="restartAll()" class="py-4 bg-white/10 rounded-2xl font-bold text-sm">MULAI DARI AWAL</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyDjj75zj5Jf7YF-55FOA5VFBIKUihhJ5vk";
        
        const rawDB = [
            { type: "pg", q: "Bagian darah yang berfungsi mengangkut oksigen adalah...", options: ["Plasma", "Eritrosit", "Leukosit", "Trombosit"], cor: "Eritrosit", detail: "Eritrosit mengandung hemoglobin yang mengikat oksigen." },
            { type: "isian", q: "Satuan SI untuk intensitas cahaya adalah...", cor: "candela", detail: "Candela adalah satuan dasar SI untuk kecerahan cahaya." },
            { type: "pg", q: "Planet yang tidak memiliki satelit alami adalah...", options: ["Mars", "Venus", "Jupiter", "Neptunus"], cor: "Venus", detail: "Hanya Merkurius dan Venus yang jomblo alias nggak punya satelit." },
            { type: "isian", q: "Zat tunggal yang tidak dapat diuraikan lagi secara kimia disebut...", cor: "unsur", detail: "Unsur itu zat paling dasar, contohnya Hidrogen atau Emas." },
            { type: "pg", q: "Cermin yang digunakan pada spion mobil agar jangkauan luas adalah...", options: ["Datar", "Cembung", "Cekung", "Ganda"], cor: "Cembung", detail: "Cermin cembung sifat bayangannya diperkecil, jadi area belakang kelihatan lebih luas." }
        ];

        // Biar jadi 50 soal (duplikasi & shuffle)
        let questionsDB = [];
        while(questionsDB.length < 50) { questionsDB = [...questionsDB, ...rawDB.sort(() => Math.random() - 0.5)]; }
        questionsDB = questionsDB.slice(0, 50);

        let currentIdx = 0; let score = 0;

        function setTheme(n) { document.body.setAttribute('data-theme', n); localStorage.setItem('userTheme', n); }
        setTheme(localStorage.getItem('userTheme') || 'midnight');

        function renderQ() {
            if(currentIdx >= questionsDB.length) { showFinal(); return; }
            const q = questionsDB[currentIdx];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-counter').innerText = `SOAL ${currentIdx + 1}/${questionsDB.length}`;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            
            if(q.type === "isian") {
                document.getElementById('isian-zone').classList.remove('hidden');
                document.getElementById('pg-zone').classList.add('hidden');
                document.getElementById('user-ans').value = "";
                document.getElementById('user-ans').className = "w-full p-5 rounded-2xl bg-white/5 border border-white/10 text-white outline-none focus:border-indigo-400";
            } else {
                document.getElementById('isian-zone').classList.add('hidden');
                document.getElementById('pg-zone').classList.remove('hidden');
                document.getElementById('pg-zone').innerHTML = q.options.map(opt => `<button onclick="checkPG('${opt}')" class="opt-btn">${opt}</button>`).join("");
            }
        }

        async function checkIsian() {
            const user = document.getElementById('user-ans').value.trim().toLowerCase();
            const target = questionsDB[currentIdx].cor.toLowerCase();
            if(!user) return;

            let dist = getDist(user, target);
            let status = dist === 0 ? "correct" : (dist <= 2 ? "typo" : "wrong");
            if(status === "correct") score += 100;
            
            showFeedback(status, questionsDB[currentIdx].cor);
            document.getElementById('user-ans').classList.add('border-' + status);
            await askAI(user, target, status);
        }

        async function checkPG(choice) {
            const target = questionsDB[currentIdx].cor;
            const status = (choice === target) ? "correct" : "wrong";
            if(status === "correct") score += 100;

            document.querySelectorAll('.opt-btn').forEach(b => {
                if(b.innerText === target) b.classList.add('opt-correct');
                else if(b.innerText === choice) b.classList.add('opt-wrong');
                b.disabled = true;
            });
            showFeedback(status, target);
            await askAI(choice, target, status);
        }

        function showFeedback(status, cor) {
            document.getElementById('feedback-box').classList.remove('hidden');
            const title = document.getElementById('res-title');
            title.innerText = (status === "correct" ? "BENAR!" : (status === "typo" ? "HAMPIR (TYPO)!" : "SALAH!")) + ` → ${cor.toUpperCase()}`;
            title.className = `font-black text-sm mb-2 ${status==='correct'?'text-green-400':status==='typo'?'text-yellow-400':'text-red-500'}`;
        }

        async function askAI(u, t, s) {
            document.getElementById('ai-msg').innerText = "Gemini sedang mengetik analisis...";
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Materi: ${t}. Jawab: ${u}. Status: ${s}. Jelaskan detail kenapa salah/benar pake bahasa gaul asik. Max 2 kalimat.` }] }] })
                });
                const data = await res.json();
                document.getElementById('ai-msg').innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                document.getElementById('ai-msg').innerText = questionsDB[currentIdx].detail;
            }
        }

        function getDist(a, b) {
            let m = Array(b.length+1).fill().map(()=>Array(a.length+1).fill(0));
            for(let i=0;i<=a.length;i++) m[0][i]=i;
            for(let j=0;j<=b.length;j++) m[j][0]=j;
            for(let j=1;j<=b.length;j++)
                for(let i=1;i<=a.length;i++)
                    m[j][i] = a[i-1]===b[j-1]?m[j-1][i-1]:Math.min(m[j-1][i],m[j][i-1],m[j-1][i-1])+1;
            return m[b.length][a.length];
        }

        function showFinal() {
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('header-ui').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-stats').innerText = score > 4000 ? "Level: Analis Master 🧠" : "Level: Pejuang OSN 🔥";
        }

        function takeScreenshot() {
            const btn = event.target;
            btn.innerText = "⏳ Memproses...";
            html2canvas(document.getElementById('capture-area'), { backgroundColor: '#020617' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `OSN-Score-${score}.png`;
                link.href = canvas.toDataURL();
                link.click();
                btn.innerText = "📸 Download Lagi";
            });
        }

        function restartAll() {
            score = 0; currentIdx = 0;
            questionsDB.sort(() => Math.random() - 0.5);
            document.getElementById('header-ui').classList.remove('hidden');
            renderQ();
        }

        function nextQ() { currentIdx++; renderQ(); }
        renderQ();
    </script>
</body>
</html>y
